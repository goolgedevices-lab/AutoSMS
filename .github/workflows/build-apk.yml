- name: AndroidX ni yoqish
  run: |
    cd extracted/AutoSMS
    echo "android.useAndroidX=true" > gradle.properties
    echo "android.enableJetifier=true" >> gradle.properties
    cat gradle.properties
    
    name: Build APK from ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository fayllarini olish
        uses: actions/checkout@v4

      - name: Java 17 o‘rnatish
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle 8.7 o‘rnatish
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7
- name: ZIP faylni ochish
  run: |
    rm -rf extracted
    unzip AutoSMS_project.zip -d extracted
    ls -la extracted
    ls -la extracted/AutoSMS

- name: AndroidX ni yoqish
  run: |
    cd extracted/AutoSMS
    echo "android.useAndroidX=true" > gradle.properties
    echo "android.enableJetifier=true" >> gradle.properties
    cat gradle.properties

- name: APK yasash
  run: |
    cd extracted/AutoSMS
    gradle assembleDebug --stacktrace

- name: APK ni yuklash
  uses: actions/upload-artifact@v4
  with:
    name: AutoSMS-debug-apk
    path: extracted/AutoSMS/app/build/outputs/apk/debug/*.apk
